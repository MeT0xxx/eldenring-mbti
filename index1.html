    let currentQuestion = 0;
    // 初始化得分对象
    let scores = {};
    for (const key in characters) {
        scores[key] = 0;
    }

    function startQuiz() {
        document.getElementById('screen-start').classList.add('hidden');
        document.getElementById('screen-quiz').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        if (currentQuestion >= questions.length) {
            calculateResult();
            return;
        }

        const q = questions[currentQuestion];
        document.getElementById('question-text').innerText = q.text;
        
        // 更新进度条
        const progress = ((currentQuestion) / questions.length) * 100;
        document.getElementById('progress-fill').style.width = progress + '%';

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        q.options.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = opt.text;
            btn.onclick = () => selectOption(opt.scores);
            optionsContainer.appendChild(btn);
        });
    }

    function selectOption(chars) {
        chars.forEach(char => {
            if(scores[char] !== undefined) {
                scores[char]++;
            }
        });
        currentQuestion++;
        renderQuestion();
    }

    function calculateResult() {
        document.getElementById('screen-quiz').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');

        // 找出得分最高的角色
        let maxScore = -1;
        let finalChar = 'ranni';

        for (const [char, score] of Object.entries(scores)) {
            if (score > maxScore) {
                maxScore = score;
                finalChar = char;
            }
        }

        const resultData = characters[finalChar];
        
        document.getElementById('result-name').innerText = resultData.name;
        document.getElementById('result-tags').innerText = `"${resultData.tags}"`;
        
        const listContainer = document.getElementById('result-list');
        listContainer.innerHTML = '';
        resultData.details.forEach(detail => {
            const li = document.createElement('li');
            li.innerText = detail;
            listContainer.appendChild(li);
        });
    }
</script>
