<html lang="zh-CN">
<head>

            align-items: center;

        }

        .container {

            max-width: 680px;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .page {
            display: none;
            opacity: 1;
            transition: opacity 0.4s ease;
            text-align: center;
        }

        .page.active {
            display: block;
        }

        .page.fade-out {
            opacity: 0;
        }

        .welcome-page {
            padding: 60px 20px;
        }

        .main-title {
            font-size: 2.5rem;
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            margin-bottom: 20px;
            letter-spacing: 4px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #8b0000;
            margin-bottom: 40px;
            font-style: italic;
            line-height: 1.8;
        }

        .intro-text {
            font-size: 1rem;
            color: #c9a961;
            line-height: 2;
            margin-bottom: 50px;
            opacity: 0.9;
        }

        .start-btn {
            background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%);
            border: 2px solid #d4af37;
            color: #d4af37;
            padding: 18px 50px;
            font-size: 1.2rem;
            font-family: Georgia, serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            letter-spacing: 2px;
        }

        .start-btn:hover {
            background: linear-gradient(180deg, #3a3a3a 0%, #2a2a2a 100%);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
            transform: scale(1.02);
        }

        .quiz-page {
            padding: 40px 0;
        }

        .progress-container {
            margin-bottom: 40px;
        }

        .progress-text {
            font-size: 0.9rem;
            color: #d4af37;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #2a2a2a;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #d4af37, #f4d160);
            transition: width 0.4s ease;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .question-container {
            background: linear-gradient(180deg, #151515 0%, #0d0d0d 100%);
            border: 1px solid #3a3a3a;
            padding: 40px 30px;
            margin-bottom: 30px;
            text-align: left;
        }

        .question-number {
            font-size: 0.85rem;
            color: #8b0000;
            margin-bottom: 15px;
            letter-spacing: 3px;
        }

        .question-text {
            font-size: 1.2rem;
            color: #d4af37;
            line-height: 1.8;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background: linear-gradient(180deg, #1f1f1f 0%, #151515 100%);
            border: 1px solid #4a4a4a;
            color: #c9a961;
            padding: 20px 25px;
            font-size: 1rem;
            font-family: Georgia, serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            line-height: 1.6;
        }

        .option-btn:hover {
            border-color: #d4af37;
            color: #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            transform: scale(1.02);
        }

        .prev-btn {
            margin-top: 20px;
            background: transparent;
            border: 1px solid #4a4a4a;
            color: #c9a961;
            padding: 12px 25px;
            font-family: Georgia, serif;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .prev-btn:hover {
            border-color: #d4af37;
            color: #d4af37;
        }

        .loading-page {
            padding: 100px 20px;
        }

        .loading-text {
            font-size: 1.4rem;
            color: #d4af37;
            margin-bottom: 40px;
            letter-spacing: 3px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .loading-symbol {
            font-size: 3rem;
            color: #d4af37;
            animation: rotate 2s linear infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .result-page {
            padding: 40px 0;
        }

        .result-container {
            background: linear-gradient(180deg, #151515 0%, #0a0a0a 100%);
            border: 2px solid #d4af37;
            padding: 50px 30px;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
        }

        .result-label {
            font-size: 0.9rem;
            color: #8b0000;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .result-title {
            font-size: 2rem;
            color: #d4af37;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .result-quote {
            font-style: italic;
            color: #c9a961;
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 30px;
            padding: 20px;
            border-left: 3px solid #8b0000;
            background: rgba(139, 0, 0, 0.1);
            text-align: left;
        }

        .result-analysis {
            color: #b8a050;
            font-size: 1rem;
            line-height: 2;
            text-align: left;
            margin-bottom: 40px;
        }

        .restart-btn {
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 15px 40px;
            font-size: 1rem;
            font-family: Georgia, serif;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        .restart-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        @media (max-width: 600px) {
            .main-title { font-size: 1.8rem; }
            .question-text { font-size: 1.1rem; }
            .result-title { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="welcomePage" class="page welcome-page active">
            <h1 class="main-title">交界地灵魂底色测试</h1>
            <p class="subtitle">面对深渊时的下意识，即是你的倒影</p>

                面对背叛、绝境与无意义的受苦，<br>

                十五道生存的拷问，<br>
                将揭示你灵魂深处的那道暗光。
            </p>
            <button class="start-btn" onclick="startQuiz()">触碰赐福</button>
        </div>

        <div id="quizPage" class="page quiz-page">
            <div class="progress-container">
                <p class="progress-text"><span id="currentQuestion">1</span> / <span id="totalQuestions">15</span></p>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 6.67%"></div>
                </div>
            </div>
            <div class="question-container">
                <p class="question-number" id="questionNumber">第一题</p>
                <h2 class="question-text" id="questionText"></h2>
            </div>
            <div class="options-container" id="optionsContainer"></div>
            <button class="prev-btn" id="prevBtn" onclick="prevQuestion()">← 上一题</button>
        </div>

        <div id="loadingPage" class="page loading-page">
            <p class="loading-text">正在读取你的追忆...</p>
            <div class="loading-symbol">✦</div>
        </div>

        <div id="resultPage" class="page result-page">
            <div class="result-container">
                <p class="result-label">你的灵魂底色是</p>
                <h1 class="result-title" id="resultTitle"></h1>
                <blockquote class="result-quote" id="resultQuote"></blockquote>
                <p class="result-analysis" id="resultAnalysis"></p>
                <button class="restart-btn" onclick="restartQuiz()">再次触碰赐福</button>
            </div>
        </div>
    </div>

                    { text: "留着卢恩，但出于同情，丢给他一点碎星肉干或者低级材料让他果腹。", scores: { emotion: 2, faith: 1 } }
                ]
            },
            {
                text: "面对一个卡了你很久、拥有“一招秒杀”机制的守关强敌，你会采取哪种策略？",
                options: [
                    { text: "去其他地方疯狂刷级，直到我的属性足以用数值碾压他。", scores: { power: 1, endurance: 2 } },
                    { text: "翻找背包，更换特定的防具、附魔和战灰，针对他的弱点专门配装。", scores: { wisdom: 2, autonomy: 1 } },
                    { text: "什么都不换。一次次冲进去，死记硬背他的每一个抬手动作，直到形成肌肉记忆。", scores: { order: 1, endurance: 2 } },
                    { text: "毫不犹豫地摇骨灰（召唤灵体）或者召唤其他玩家，能群殴绝不单挑。", scores: { wisdom: 1, emotion: 1, power: -1 } }

            },
            {
                text: "你在悬崖边看到地上有一条其他玩家留下的发光谏言：“试着跳下去吧，前有隐藏道路。”下方一片漆黑。你的反应是？",
                options: [
                    { text: "直接跳！探索未知的刺激感值得用一条命去换。", scores: { autonomy: 2, ambition: 1 } },

            {

                options: [

            {
                text: "一个在游戏前期帮助过你很多次的友善NPC，因为染上腐败正在痛苦地变异成怪物，他用最后的理智哀求你杀了他。你会？",
                options: [
                    { text: "给他一个痛快。这是对他尊严最后的维护，也是最理性的选择。", scores: { order: 1, emotion: -1, wisdom: 1 } },
                    { text: "不顾一切地去满世界寻找解药，哪怕我知道希望渺茫。", scores: { faith: 2, endurance: 1 } },
                    { text: "转身逃跑。我实在无法亲手杀死曾有恩于我的人，也无法直视他的惨状。", scores: { emotion: 2, autonomy: -1 } },
                    { text: "在一旁冷眼观察他变异的整个过程，记录下腐败侵蚀人体的第一手资料。", scores: { wisdom: 2, power: 1, emotion: -2 } }
                ]
            },
            {
                text: "经过一整天的殊死搏斗，你终于坐在了一个安全的赐福（篝火）旁休息，看着自己满是伤痕的双手。你此刻脑海中冒出的想法是？",
                options: [
                    { text: "“还要再杀多少人，跨过多少尸体，我才能走到最后？”", scores: { endurance: 1, emotion: 1 } },
                    { text: "“我所做的一切，真的对修复这个支离破碎的世界有意义吗？”", scores: { faith: 1, order: 1 } },
                    { text: "“刚才那个BOSS的连招，如果我能在第二段接翻滚，输出空间会更大。”", scores: { wisdom: 2, power: 1 } },
                    { text: "“我的肌肉和反应比昨天更锐利了，我正在变得不可阻挡。”", scores: { power: 2, ambition: 1 } }
                ]
            },
            {
                text: "你在打高难BOSS时召唤了一个其他玩家帮忙，结果关键时刻他为了自己活命，故意把你卡在死角，导致你被BOSS劈死。你的反应是？",
                options: [
                    { text: "极其暴怒，记住他的ID，如果有机会入侵绝对要把他杀回老家。", scores: { emotion: 2, power: 1 } },
                    { text: "无语地笑出声。算了，在这个尔虞我诈的交界地，背刺太正常了。", scores: { autonomy: 1, endurance: 1 } },
                    { text: "直接拉黑，然后开始复盘刚才的走位，认为把希望寄托在别人身上本来就是错的。", scores: { wisdom: 2, order: 1 } },
                    { text: "感到一阵深深的心寒，开始怀疑在这片土地上是否还存在真正的善意。", scores: { emotion: 2, faith: 1 } }
                ]
            },
            {
                text: "一个诡异的灵体向你献上一把流淌着黑血的短剑：“只要用它划破手腕，献祭你一半的生命上限，它就能一击秒杀前方的半神。”你会接受吗？",
                options: [
                    { text: "毫不犹豫地接受。极致的攻击就是最好的防御，只要我不被打中就行了。", scores: { power: 2, ambition: 1 } },
                    { text: "断然拒绝。我依靠的是自己千锤百炼的均衡实力，绝不沾染这种投机取巧的邪门歪道。", scores: { order: 2, autonomy: 1 } },
                    { text: "先拿上，但把它当成压箱底的最后手段，不到真正绝望的死局绝对不用。", scores: { wisdom: 1, endurance: 1 } },
                    { text: "不去碰剑，而是试图审问灵体这把剑的由来以及这种邪恶魔法的运作机制。", scores: { wisdom: 2, faith: -1 } }
                ]
            },
            {
                text: "你踏入一座没有腐败与战火的绝美城池。但你发现，这里的居民全部被一种高阶魔法禁锢在一种虚假的、没有痛苦的幻梦中。你会？",
                options: [
                    { text: "拔剑破坏魔法源头。宁可让他们在残酷的现实中醒来面对死亡，也不能活在虚假里。", scores: { autonomy: 2, emotion: 1 } },
                    { text: "默默离开。交界地已经够苦了，这种虚假的安宁，或许也是一种仁慈的救赎。", scores: { order: 1, endurance: 1, faith: 1 } },
                    { text: "不关心他们的死活，只对这个能够维持全城幻梦的高阶魔法原理感兴趣。", scores: { wisdom: 2, ambition: 1 } },
                    { text: "趁他们无法反抗，把城里值钱的资源和道具全部搜刮走。", scores: { power: 1, ambition: 2, emotion: -1 } }
                ]
            },
            {
                text: "一位全知全能的先知冷冷地告诉你：“无论你多么努力，你的终局注定是失败与被遗忘，这是世界法则刻好的命轨。”你的回应是？",
                options: [
                    { text: "拔剑斩向先知：“我的命，只有我手里的剑说了算！”", scores: { power: 2, autonomy: 2 } },
                    { text: "咬紧牙关：“那就让我看看，是世界的法则硬，还是我的骨头硬。”", scores: { endurance: 2, ambition: 1 } },
                    { text: "轻蔑一笑：“如果注定没有结果，那我就把这个烂透的世界拉着一起陪葬。”", scores: { emotion: 2, autonomy: 1, order: -2 } },
                    { text: "冷静分析：“既然你都能看到未来，说明所谓的‘法则’存在观测漏洞，我要找出它。”", scores: { wisdom: 2, order: -1 } }
                ]
            },
            {
                text: "历经千难万险，你终于踏着无数尸骨来到了王座前。王座空无一人，冰冷且布满灰尘。你走上前，第一件做的事是？",
                options: [
                    { text: "毫不犹豫地坐上去。这是我应得的战利品，从今以后，我就是规则的制定者。", scores: { ambition: 3, power: 1 } },
                    { text: "转身背对王座离开。把权力的王冠抛在脑后，真正的自由是在那片无垠的星空下。", scores: { autonomy: 3, wisdom: 1 } },
                    { text: "双膝跪地。脑海中闪过一路走来死去的同伴，被一种巨大的虚无感和悲伤淹没。", scores: { emotion: 2, endurance: 1 } },
                    { text: "施展祈祷或魔法，试图净化这把椅子上的血迹与腐败，准备开启一个严谨的新纪元。", scores: { order: 2, faith: 2 } }
                ]
            },
            {
                text: "屏幕上弹出巨大的红色字眼“YOU DIED”（你死了）。面对这种已经发生过上百次的场景，你现实中真实的生理反应往往是？",
                options: [
                    { text: "深吸一口气，大脑飞速回放刚才死前那一刻的操作失误，然后秒按复活键。", scores: { wisdom: 1, endurance: 2 } },
                    { text: "破口大骂一声，把手柄/鼠标捏得嘎吱作响，心跳急剧加速。", scores: { emotion: 2, power: 1 } },
                    { text: "面无表情地往后一靠，拿起水杯喝口水，觉得有些累了，想去阳台抽根烟或吹吹风。", scores: { autonomy: 1, order: 1 } },
                    { text: "呆呆地看着黑屏上的倒影，产生一种“我到底在为了什么受苦”的哲学怀疑。", scores: { faith: 1, emotion: 1 } }
                ]
            }
        ];

        // ============ 应用状态 ============
        let currentQuestionIndex = 0;
        let answerHistory = []; // 记录每题的答案，用于回退
        // 核心评分维度
        let scores = {
            order: 0, faith: 0, power: 0, wisdom: 0,
            autonomy: 0, emotion: 0, ambition: 0, endurance: 0
        };

        // ============ DOM 元素 ============
        const welcomePage = document.getElementById('welcomePage');
        const quizPage = document.getElementById('quizPage');
        const loadingPage = document.getElementById('loadingPage');
        const resultPage = document.getElementById('resultPage');
        const questionText = document.getElementById('questionText');
        const questionNumberEl = document.getElementById('questionNumber');
        const optionsContainer = document.getElementById('optionsContainer');
        const currentQuestionEl = document.getElementById('currentQuestion');
        const totalQuestionsEl = document.getElementById('totalQuestions');
        const progressFill = document.getElementById('progressFill');
        const prevBtn = document.getElementById('prevBtn');
        const resultTitle = document.getElementById('resultTitle');
        const resultQuote = document.getElementById('resultQuote');
        const resultAnalysis = document.getElementById('resultAnalysis');

        const numberTexts = ['第一', '第二', '第三', '第四', '第五', '第六', '第七', '第八', '第九', '第十',
                            '第十一', '第十二', '第十三', '第十四', '第十五'];

        function showPage(pageId) {
            [welcomePage, quizPage, loadingPage, resultPage].forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');
        }

        function startQuiz() {
            currentQuestionIndex = 0;
            answerHistory = [];
            scores = { order: 0, faith: 0, power: 0, wisdom: 0, autonomy: 0, emotion: 0, ambition: 0, endurance: 0 };
            totalQuestionsEl.textContent = questions.length;
            showPage('quizPage');
            renderQuestion();
        }

        function renderQuestion() {
            const question = questions[currentQuestionIndex];
            currentQuestionEl.textContent = currentQuestionIndex + 1;
            const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            progressFill.style.width = progress + '%';
            questionNumberEl.textContent = numberTexts[currentQuestionIndex] + '题';
            questionText.textContent = question.text;

            optionsContainer.innerHTML = '';
            question.options.forEach((option) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option.text;
                // 点击时传入该选项的分数对象
                btn.onclick = () => handleAnswer(option.scores);
                optionsContainer.appendChild(btn);
            });

            prevBtn.style.display = currentQuestionIndex > 0 ? 'inline-block' : 'none';
        }

        function handleAnswer(chosenScores) {
            // 记录答案历史用于“上一题”
            answerHistory.push({ scores: chosenScores });

            // 累加分数 (这里已经删除了导致BUG的 scores.dimension 行)
            for (const dimension in chosenScores) {
                scores[dimension] += chosenScores[dimension];
            }

            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                quizPage.classList.add('fade-out');
                setTimeout(() => {
                    renderQuestion();
                    quizPage.classList.remove('fade-out');
                }, 300);
            } else {
                showPage('loadingPage');
                setTimeout(() => {
                    calculateResult();
                    showPage('resultPage');
                }, 2000);
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex <= 0 || answerHistory.length === 0) return;

            const prevAnswer = answerHistory.pop();
            for (const dimension in prevAnswer.scores) {
                scores[dimension] -= prevAnswer.scores[dimension];
            }

            currentQuestionIndex--;
            quizPage.classList.add('fade-out');
            setTimeout(() => {
                renderQuestion();
                quizPage.classList.remove('fade-out');
            }, 300);
        }

        // 使用余弦相似度匹配最符合的角色
        function calculateResult() {
            let bestCharacter = null;
            let bestSimilarity = -Infinity;

            for (const charId in characters) {
                const char = characters[charId];
                const similarity = calculateCosineSimilarity(scores, char.dimensionProfile);

                if (similarity > bestSimilarity) {
                    bestSimilarity = similarity;
                    bestCharacter = charId;
                }
            }

            const result = characters[bestCharacter];
            resultTitle.textContent = result.name;
            resultQuote.textContent = "「" + result.quote + "」";
            resultAnalysis.textContent = result.analysis;
        }

        function calculateCosineSimilarity(vec1, vec2) {
            let dotProduct = 0;
            let norm1 = 0;
            let norm2 = 0;

            for (const key in vec1) {
                dotProduct += vec1[key] * vec2[key];
                norm1 += vec1[key] * vec1[key];
                norm2 += vec2[key] * vec2[key];
            }

            if (norm1 === 0 || norm2 === 0) return 0;
            return dotProduct / (Math.sqrt(norm1) * Math.sqrt(norm2));
        }

        function restartQuiz() {
            showPage('welcomePage');
        }
    </script>
